name: 'ecommerce'                    # Nome do projeto (mesmo do dbt init)
version: '1.0.0'
config-version: 2

profile: 'ecommerce'                 # Deve bater com o nome no profiles.yml

# Pastas do projeto
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configuracoes de modelos por camada
models:
  ecommerce:                          # Deve bater com o name do projeto
    bronze:
      +materialized: view             # Views - sempre atualizadas, sem custo de storage
      +schema: bronze                 # Schema: bronze
      +tags: ["bronze", "raw"]
      +meta:
        modeling_layer: bronze

    silver:
      +materialized: table            # Tables - colunas calculadas persistidas
      +schema: silver                 # Schema: silver
      +tags: ["silver", "cleaned"]
      +meta:
        modeling_layer: silver

    gold:
      +materialized: table            # Tables - modelos analiticos prontos para consumo
      +tags: ["gold"]
      +meta:
        modeling_layer: gold

      dimensional:
        +schema: gold                 # Schema: public_gold
        +tags: ["gold", "dimensional"]
        +meta:
          gold_role: dimensional

      marts:
        +tags: ["gold", "mart", "kpi", "metrics"]
        +meta:
          gold_role: mart
        sales:
          +schema: gold_sales         # Schema: public_gold_sales
        customer_success:
          +schema: gold_cs            # Schema: public_gold_cs
        pricing:
          +schema: gold_pricing       # Schema: public_gold_pricing

# Variaveis do projeto
vars:
  segmentacao_vip_threshold: 10000
  segmentacao_top_tier_threshold: 5000
  faixa_venda_barato_max: 100
  faixa_venda_medio_max: 500
  faixa_produto_premium_min: 1000
  faixa_produto_medio_min: 500
  data_referencia_cs: null
